# Список направлений, по которым нужно отслеживать место в конкурсном списке.
#
# У каждого направления НГТУ теперь своя прямая ссылка (спасибо, так гораздо
# надёжнее). Список на странице — не HTML-таблица, а карточки вида
# "ID профиля ЕПГУ: 1339447" — за это отвечает mode: "id_epgu" в parser.py:
# порядок карточек на странице = место в конкурсном списке.
#
# autoscroll: true — на случай, если карточки подгружаются по мере прокрутки
# (бесконечный скролл); если список целиком в HTML сразу, эта прокрутка
# просто ничего не изменит и завершится за пару итераций.

# Каждый, за кем нужно следить, — отдельная запись. Все пользователи
# проверяются по одному и тому же списку "programs" ниже. Когда друг
# напишет боту, main.py по chat_id найдёт его в этом списке и ответит
# лично ему (полный статус), не трогая остальных.
#
# Чтобы добавить друга: попроси его написать что-нибудь боту, возьми его
# chat_id тем же способом, что и раньше (getUpdates), узнай его код
# абитуриента и добавь новую запись сюда.
users:
