name: Ответ боту в Telegram по запросу (запасной опрос)

# Расписание отключено: теперь основной путь — мгновенный вебхук
# (instant_respond.yml, через Cloudflare Worker), а не поллинг раз в
# несколько минут. Если у бота включён вебхук (setWebhook), getUpdates
# здесь всё равно ничего не найдёт (Telegram отдаёт обновления только
# одним способом — либо вебхуком, либо getUpdates). Оставлено как ручной
# запасной вариант на случай, если вебхук временно не работает —
# тогда можно временно вернуть строку "schedule:" ниже или просто
# запустить вручную.
on:
  workflow_dispatch: {}

# Общая с track_admission.yml группа — оба workflow пишут в
# university_tracker/data/state.json, и параллельный запуск приводит к
# конфликту при git push (один прогон падает, оба шлют дублирующиеся
# уведомления по устаревшим данным). cancel-in-progress: false — новый
# запуск просто ждёт своей очереди.
concurrency:
  group: admission-tracker-git
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-command:
    runs-on: ubuntu-latest
    outputs:
      triggered: ${{ steps.check.outputs.triggered }}
      chat_id: ${{ steps.check.outputs.chat_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Проверить, не написали ли боту команду
        id: check
        working-directory: university_tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          mapfile -t OUTPUT < <(python3 check_telegram_trigger.py)
          echo "triggered=${OUTPUT[0]}" >> "$GITHUB_OUTPUT"
          echo "chat_id=${OUTPUT[1]}" >> "$GITHUB_OUTPUT"

      - name: Сохранить offset
        run: |
          git config user.name "admission-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add university_tracker/data/telegram_offset.json
          if ! git diff --cached --quiet; then
            git commit -m "Обновить offset Telegram"
            git pull --rebase -X ours origin main
            git push
          fi

  respond:
    needs: check-command
    if: needs.check-command.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: university_tracker
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Проверить конкурсные списки и ответить
        working-directory: university_tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TRIGGERED_CHAT_ID: ${{ needs.check-command.outputs.chat_id }}
        run: python main.py

      - name: Сохранить состояние
        run: |
          git config user.name "admission-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add university_tracker/data/state.json
          if ! git diff --cached --quiet; then
            git commit -m "Обновить состояние (по запросу из Telegram)"
            git pull --rebase -X ours origin main
            git push
          fi
