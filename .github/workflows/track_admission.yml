name: Отслеживание места в конкурсных списках вузов

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

# Общая с telegram_on_demand.yml группа: оба workflow пишут в
# university_tracker/data/state.json, и если запустятся одновременно —
# ловят конфликт при git push и второй прогон падает с ошибкой, а оба
# шлют одинаковые (устаревшие) уведомления. cancel-in-progress: false —
# новый запуск просто ждёт своей очереди, а не отменяет текущий.
concurrency:
  group: admission-tracker-git
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: university_tracker
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Проверить конкурсные списки
        working-directory: university_tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

      - name: Сохранить состояние
        run: |
          git config user.name "admission-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add university_tracker/data/state.json
          if ! git diff --cached --quiet; then
            git commit -m "Обновить состояние конкурсных списков"
            git pull --rebase -X ours origin main
            git push
          fi
